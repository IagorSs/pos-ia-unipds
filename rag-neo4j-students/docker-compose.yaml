services:
  neo4j-docker-service:
    image: neo4j:5.14.0-community
    container_name: neo4j
    volumes:
      - ./docker/storage/neo4j/data:/data
      - ./docker/storage/neo4j/logs:/logs
      - ./docker/storage/neo4j/plugins:/plugins
      - ./docker/storage/neo4j/import:/var/lib/neo4j/import
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt Protocol (for queries)
    environment:
      - NEO4J_AUTH=${GRAPH_DB_USER?error}/${GRAPH_DB_PASS?error}
      - NEO4JLABS_PLUGINS=["apoc"]
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
  app:
    build:
      context: ./docker
      dockerfile: app.Dockerfile
    container_name: rag-neo4j-students-env
    volumes:
      - .:/app
    ports:
      - 2024:2024
      - 9978:9978